# ==============================================================================
# flori web (Next.js 16 admin) CI/CD — DEV
# ==============================================================================
# 배치: flori-ai-kr/web 리포 .github/workflows/deploy-web-dev.yml (별도 레포, 코드 루트)
# 흐름: ARM64 네이티브 standalone 빌드 → ECR(flori-dev/web) → SSH deploy.web.sh
# 패턴: aws-infra/.github/workflows/api/deploy-optigen-dev.yml 과 동일 (ubuntu-24.04-arm, QEMU 불필요)
#
# [HARD] next.config.ts 가 validateEnv() 를 모듈 로드 시 실행 → `next build`(Docker) 시점에
#   NEXT_PUBLIC_VAPID_PUBLIC_KEY(클라 번들에 baked) 만 build-arg 로 필요.
#   INTERNAL_API_KEY 는 Dockerfile placeholder 로 검증만 통과시키고 실값은 런타임(.env.web)에서 주입.
#   (Supabase/R2 는 폐기된 스택 — 제거됨. build job 에 environment: dev 로 secrets 사용)
# next.config.ts 에 `output: 'standalone'` 적용됨. Dockerfile 은 레포 루트.
#
# GitHub Environment `dev` secrets (필수):
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  (flori-gha-ecr)
#   SSH_HOST (= flori-dev-app EIP 3.35.191.16) / SSH_USER (ec2-user) / SSH_PRIVATE_KEY (flori-key.pem)
#   NEXT_PUBLIC_VAPID_PUBLIC_KEY  ← 클라 번들에 baked(필수, 비어있으면 빌드 실패)
# GitHub Environment `dev` variables (옵션 · 공개값이라 secret 아님, vars 로 주입):
#   NEXT_PUBLIC_KAKAO_OPENCHAT_URL   ← 사전등록 오픈채팅 링크. 미설정 시 버튼 비활성
#   NEXT_PUBLIC_GA_MEASUREMENT_ID    ← GA4 측정 ID(G-…). 미설정 시 GA 미로드
#   NEXT_PUBLIC_CLARITY_PROJECT_ID   ← Microsoft Clarity 프로젝트 ID. 미설정 시 Clarity 미로드
#   (모두 NEXT_PUBLIC = next build 시점 baked. 값 변경 시 재빌드 필요)
# ==============================================================================

name: 🚀 Deploy web (DEV)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: flori-dev/web

jobs:
  build-and-push:
    name: 빌드 및 ECR Push
    runs-on: ubuntu-24.04-arm # ARM 네이티브 러너 → arm64 직접 빌드(QEMU 에뮬레이션 불필요, server/ai 와 동일)
    environment: dev # environment-scoped secrets 를 build-args 로 사용
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: 이미지 태그 생성
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(TZ='Asia/Seoul' date +'%Y%m%d%H%M%S')
          echo "tags=${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3
      - name: Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tags }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_KAKAO_OPENCHAT_URL=${{ vars.NEXT_PUBLIC_KAKAO_OPENCHAT_URL }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_CLARITY_PROJECT_ID=${{ vars.NEXT_PUBLIC_CLARITY_PROJECT_ID }}

  deploy:
    name: EC2 배포
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /home/ec2-user/scripts/deploy.web.sh ${{ needs.build-and-push.outputs.image_tag }}
